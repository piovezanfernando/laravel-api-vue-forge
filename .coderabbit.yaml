# yaml-language-server: $schema=https://coderabbit.ai/export/schema.json
language: "pt-BR"
reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true
  path_filters:
    - "!**/*.lock"
    - "!**/vendor/**"
    - "!**/node_modules/**"
chat:
  auto_reply: true
